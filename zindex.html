<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Police Game</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== FPS CAMERA =====
const pitch = new THREE.Object3D();
pitch.add(camera);

const yaw = new THREE.Object3D();
yaw.position.set(0,2,0);
yaw.add(pitch);

scene.add(yaw);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== BUILDINGS =====
const buildings=[];
for(let i=0;i<40;i++){
  let h=Math.random()*8+4;

  let b=new THREE.Mesh(
    new THREE.BoxGeometry(4,h,4),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set((Math.random()-0.5)*120,h/2,(Math.random()-0.5)*120);
  scene.add(b);
  buildings.push(b);
}

// ===== INPUT =====
let keys={};

addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;

  if(e.code==="Space" && onGround){
    velocityY = jumpPower;
    onGround = false;
  }
});

addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

// ===== LOOK =====
addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw.rotation.y -= e.movementX*0.002;
    pitch.rotation.x -= e.movementY*0.002;
    pitch.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch.rotation.x));
  }
});

// ===== PHYSICS =====
let velocityY = 0;
let onGround = true;
const gravity = -0.015;
const jumpPower = 0.35;
const groundHeight = 2;

// ===== COLLISION =====
function canMove(x,z){
  for(let b of buildings){
    if(Math.abs(x - b.position.x) < 3 &&
       Math.abs(z - b.position.z) < 3){
      return false;
    }
  }
  return true;
}

// ===== PORTALS =====
let portalA=null, portalB=null, clickCount=0;

function makePortal(color){
  let p=new THREE.Mesh(
    new THREE.TorusGeometry(1,0.25,16,100),
    new THREE.MeshBasicMaterial({color})
  );
  scene.add(p);
  return p;
}

addEventListener("mousedown",e=>{
  if(e.button!==0) return;

  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);

  let px=yaw.position.x+dir.x*10;
  let py=yaw.position.y+dir.y*10;
  let pz=yaw.position.z+dir.z*10;

  clickCount++;

  if(clickCount%2){
    if(!portalA) portalA=makePortal(0x0000ff);
    portalA.position.set(px,py,pz);
  }else{
    if(!portalB) portalB=makePortal(0xff8800);
    portalB.position.set(px,py,pz);
  }
});

// ===== TELEPORT =====
let cooldown=0;

function teleport(){
  if(!portalA||!portalB||cooldown>0) return;

  let pos=yaw.position;

  let dA=Math.hypot(pos.x-portalA.position.x,pos.z-portalA.position.z);
  let dB=Math.hypot(pos.x-portalB.position.x,pos.z-portalB.position.z);

  if(dA<2){
    exitPortal(portalB);
  }
  else if(dB<2){
    exitPortal(portalA);
  }
}

function exitPortal(portal){
  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);

  yaw.position.copy(portal.position);

  yaw.position.x += dir.x * 4;
  yaw.position.z += dir.z * 4;

  velocityY = 0;
  cooldown = 25;
}

// ===== GUN =====
const gun=new THREE.Mesh(
  new THREE.BoxGeometry(0.4,0.4,1),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
camera.add(gun);
gun.position.set(0.6,-0.5,-1.2);

// ===== POLICE =====
const police=[];

for(let i=0;i<5;i++){
  let p=new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshLambertMaterial({color:0xff0000})
  );

  p.position.set((Math.random()-0.5)*100,1,(Math.random()-0.5)*100);
  scene.add(p);

  police.push({mesh:p,speed:0.05});
}

function policeCanMove(x,z){
  for(let b of buildings){
    if(Math.abs(x - b.position.x) < 3 &&
       Math.abs(z - b.position.z) < 3){
      return false;
    }
  }
  return true;
}

function policeTeleport(p){
  if(!portalA||!portalB) return;

  let pos=p.mesh.position;

  let dA=Math.hypot(pos.x-portalA.position.x,pos.z-portalA.position.z);
  let dB=Math.hypot(pos.x-portalB.position.x,pos.z-portalB.position.z);

  if(dA<2){
    p.mesh.position.copy(portalB.position);
  }
  else if(dB<2){
    p.mesh.position.copy(portalA.position);
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(cooldown>0) cooldown--;

  // movement
  let forward=new THREE.Vector3(0,0,-1).applyQuaternion(yaw.quaternion);
  forward.y=0;
  forward.normalize();

  let right=new THREE.Vector3(1,0,0).applyQuaternion(yaw.quaternion);
  right.normalize();

  let nx=yaw.position.x;
  let nz=yaw.position.z;
  let speed=0.2;

  if(keys["w"]){ nx += forward.x*speed; nz += forward.z*speed; }
  if(keys["s"]){ nx -= forward.x*speed; nz -= forward.z*speed; }
  if(keys["a"]){ nx -= right.x*speed; nz -= right.z*speed; }
  if(keys["d"]){ nx += right.x*speed; nz += right.z*speed; }

  if(canMove(nx,nz)){
    yaw.position.x = nx;
    yaw.position.z = nz;
  }

  // gravity
  velocityY += gravity;
  yaw.position.y += velocityY;

  if(yaw.position.y <= groundHeight){
    yaw.position.y = groundHeight;
    velocityY = 0;
    onGround = true;
  }

  teleport();

  // ===== POLICE AI =====
  for(let p of police){
    let dx = yaw.position.x - p.mesh.position.x;
    let dz = yaw.position.z - p.mesh.position.z;

    let dist = Math.hypot(dx,dz);

    if(dist > 0){
      dx /= dist;
      dz /= dist;
    }

    let nx = p.mesh.position.x + dx * p.speed;
    let nz = p.mesh.position.z + dz * p.speed;

    if(policeCanMove(nx,nz)){
      p.mesh.position.x = nx;
      p.mesh.position.z = nz;
    }

    policeTeleport(p);
  }

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
