<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Portal Game</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== PLAYER =====
let x=0, z=0, angle=0;
let speed=0;

// ===== CONTROLS =====
let keys={};
addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

document.body.onclick = ()=>document.body.requestPointerLock();

addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    angle -= e.movementX * 0.002;
  }
});

// ===== WORLD =====
const buildings=[];

for(let i=0;i<60;i++){
  const h = Math.random()*10+5;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set(
    (Math.random()-0.5)*80,
    h/2,
    (Math.random()-0.5)*80
  );

  scene.add(b);
  buildings.push(b);
}

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PORTALS =====
let portalA=null;
let portalB=null;

function createPortal(color){
  const p = new THREE.Mesh(
    new THREE.CircleGeometry(1,32),
    new THREE.MeshBasicMaterial({color:color})
  );
  p.rotation.x = -Math.PI/2;
  scene.add(p);
  return p;
}

// place portals
addEventListener("mousedown", e=>{
  const dx = Math.sin(angle);
  const dz = Math.cos(angle);

  const px = x + dx*10;
  const pz = z + dz*10;

  if(e.button===0){
    if(!portalA) portalA = createPortal(0x0000ff);
    portalA.position.set(px,0.1,pz);
  }

  if(e.button===2){
    if(!portalB) portalB = createPortal(0xff8800);
    portalB.position.set(px,0.1,pz);
  }
});

addEventListener("contextmenu", e=>e.preventDefault());

// ===== TELEPORT =====
function teleport(){
  if(!portalA || !portalB) return;

  const dA = Math.hypot(x-portalA.position.x, z-portalA.position.z);
  const dB = Math.hypot(x-portalB.position.x, z-portalB.position.z);

  if(dA < 1){
    x = portalB.position.x;
    z = portalB.position.z;
    speed = 0;
  }
  else if(dB < 1){
    x = portalA.position.x;
    z = portalA.position.z;
    speed = 0;
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  // movement
  if(keys["w"]) speed+=0.02;
  if(keys["s"]) speed-=0.02;
  speed*=0.9;

  if(keys["a"]) angle+=0.04;
  if(keys["d"]) angle-=0.04;

  x += Math.sin(angle)*speed*2;
  z += Math.cos(angle)*speed*2;

  teleport();

  // camera
  camera.position.set(
    x - Math.sin(angle)*10,
    6,
    z - Math.cos(angle)*10
  );

  camera.lookAt(x,0,z);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
