<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal FPS FIXED</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== FPS CAMERA =====
const pitch = new THREE.Object3D();
pitch.add(camera);

const yaw = new THREE.Object3D();
yaw.position.set(0,2,0);
yaw.add(pitch);

scene.add(yaw);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== BUILDINGS =====
const buildings=[];
for(let i=0;i<80;i++){
  let h=Math.random()*10+5;

  let b=new THREE.Mesh(
    new THREE.BoxGeometry(4,h,4),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
  scene.add(b);

  buildings.push({mesh:b,size:2});
}

// ===== CONTROLS =====
let keys={};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

// ===== MOUSE LOOK =====
addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw.rotation.y -= e.movementX*0.002;
    pitch.rotation.x -= e.movementY*0.002;

    pitch.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch.rotation.x));
  }
});

// ===== COLLISION =====
function canMove(pos){
  for(let b of buildings){
    let dx=pos.x-b.mesh.position.x;
    let dz=pos.z-b.mesh.position.z;

    if(Math.abs(dx)<3 && Math.abs(dz)<3){
      return false;
    }
  }
  return true;
}

// ===== PORTALS =====
let portalA=null;
let portalB=null;
let clickCount=0;

function makePortal(color){
  let p=new THREE.Mesh(
    new THREE.TorusGeometry(1,0.3,16,100),
    new THREE.MeshBasicMaterial({color})
  );
  scene.add(p);
  return p;
}

addEventListener("mousedown",e=>{
  if(e.button!==0) return;

  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);

  let pos=yaw.position;

  let px=pos.x+dir.x*10;
  let py=pos.y+dir.y*10;
  let pz=pos.z+dir.z*10;

  clickCount++;

  if(clickCount%2){
    if(!portalA) portalA=makePortal(0x0000ff);
    portalA.position.set(px,py,pz);
  }else{
    if(!portalB) portalB=makePortal(0xff8800);
    portalB.position.set(px,py,pz);
  }
});

// ===== GUN (FIXED) =====
const gun=new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.3,1),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(gun);

// ===== TELEPORT FIX =====
let cooldown=0;

function teleport(){
  if(!portalA||!portalB||cooldown>0) return;

  let pos=yaw.position;

  let dA=Math.hypot(pos.x-portalA.position.x,pos.z-portalA.position.z);
  let dB=Math.hypot(pos.x-portalB.position.x,pos.z-portalB.position.z);

  if(dA<2){
    yaw.position.copy(portalB.position);
    cooldown=20;
  }
  else if(dB<2){
    yaw.position.copy(portalA.position);
    cooldown=20;
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  if(cooldown>0) cooldown--;

  // CORRECT FORWARD
  let forward=new THREE.Vector3();
  yaw.getWorldDirection(forward);
  forward.y=0;
  forward.normalize();

  let right=new THREE.Vector3();
  right.crossVectors(forward,new THREE.Vector3(0,1,0)).normalize();

  let speed=0.2;
  let newPos=yaw.position.clone();

  // FIX: invert movement (THIS WAS THE BUG)
  if(keys["w"]) newPos.add(forward.clone().multiplyScalar(-speed));
  if(keys["s"]) newPos.add(forward.clone().multiplyScalar(speed));
  if(keys["a"]) newPos.add(right.clone().multiplyScalar(-speed));
  if(keys["d"]) newPos.add(right.clone().multiplyScalar(speed));

  if(canMove(newPos)){
    yaw.position.copy(newPos);
  }

  teleport();

  // ===== GUN FIX =====
  let dir=new THREE.Vector3();
  camera.getWorldDirection(dir);

  let rightVec=new THREE.Vector3();
  rightVec.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();

  gun.position.copy(camera.position);
  gun.position.add(dir.clone().multiplyScalar(0.6));
  gun.position.add(rightVec.clone().multiplyScalar(0.3));
  gun.position.y-=0.4;

  gun.rotation.copy(camera.rotation);

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
