<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal FPS TRUE AIM</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== BUILDINGS =====
for(let i=0;i<80;i++){
  let h = Math.random()*10 + 5;

  let b = new THREE.Mesh(
    new THREE.BoxGeometry(4,h,4),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set(
    (Math.random()-0.5)*200,
    h/2,
    (Math.random()-0.5)*200
  );

  scene.add(b);
}

// ===== PLAYER =====
let x=0, y=2, z=0;
let yaw=0;
let pitch=0;

// ===== CONTROLS =====
let keys={};

addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

document.body.onclick = ()=>document.body.requestPointerLock();

addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    // limit up/down
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// ===== VECTORS =====
const direction = new THREE.Vector3();
const right = new THREE.Vector3();

// ===== PORTALS =====
let portalA=null;
let portalB=null;
let clickCount=0;

function makePortal(color){
  let p = new THREE.Mesh(
    new THREE.TorusGeometry(1,0.3,16,100),
    new THREE.MeshBasicMaterial({color})
  );
  scene.add(p);
  return p;
}

// ===== SHOOT PORTAL (NOW FULL 3D AIM) =====
addEventListener("mousedown", e=>{
  if(e.button!==0) return;

  // get full camera direction
  camera.getWorldDirection(direction);

  let px = x + direction.x * 10;
  let py = y + direction.y * 10;
  let pz = z + direction.z * 10;

  clickCount++;

  if(clickCount % 2 === 1){
    if(!portalA) portalA = makePortal(0x0000ff);
    portalA.position.set(px,py,pz);
  } else {
    if(!portalB) portalB = makePortal(0xff8800);
    portalB.position.set(px,py,pz);
  }
});

// ===== GUN =====
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.3,1),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(gun);

// ===== TELEPORT =====
function teleport(){
  if(!portalA || !portalB) return;

  let dA = Math.hypot(x-portalA.position.x, z-portalA.position.z);
  let dB = Math.hypot(x-portalB.position.x, z-portalB.position.z);

  if(dA < 2){
    x = portalB.position.x;
    z = portalB.position.z;
    y = portalB.position.y;
  }
  else if(dB < 2){
    x = portalA.position.x;
    z = portalA.position.z;
    y = portalA.position.y;
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  // rotation
  camera.rotation.set(pitch, -yaw, 0);

  // direction (forward)
  camera.getWorldDirection(direction);
  direction.y = 0;
  direction.normalize();

  // right vector
  right.crossVectors(direction, new THREE.Vector3(0,1,0)).normalize();

  let speed = 0.2;

  if(keys["w"]){
    x += direction.x * speed;
    z += direction.z * speed;
  }
  if(keys["s"]){
    x -= direction.x * speed;
    z -= direction.z * speed;
  }
  if(keys["a"]){
    x -= right.x * speed;
    z -= right.z * speed;
  }
  if(keys["d"]){
    x += right.x * speed;
    z += right.z * speed;
  }

  teleport();

  // camera position
  camera.position.set(x,y,z);

  // ===== GUN LOCK =====
  camera.getWorldDirection(direction);

  gun.position.copy(camera.position);
  gun.position.add(direction.clone().multiplyScalar(0.8));
  gun.position.add(right.clone().multiplyScalar(0.4));
  gun.position.y -= 0.5;

  gun.rotation.copy(camera.rotation);

  renderer.render(scene, camera);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
