<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Game Fixed</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// ===== PLAYER =====
let x=0, z=0, angle=0, speed=0;

// ===== PORTALS =====
let portalA=null;
let portalB=null;

// ===== CONTROLS =====
let keys={};

onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;

c.onclick=()=>c.requestPointerLock();

onmousemove=e=>{
  if(document.pointerLockElement===c){
    angle -= e.movementX * 0.002;
  }
};

onmousedown=e=>{
  let dx=Math.sin(angle);
  let dz=Math.cos(angle);

  let hit={
    x:x + dx*12,
    z:z + dz*12
  };

  if(e.button===0) portalA=hit;
  if(e.button===2) portalB=hit;
};

oncontextmenu=e=>e.preventDefault();

// ===== WORLD =====
let buildings=[];
for(let i=0;i<60;i++){
  buildings.push({
    x:(Math.random()-0.5)*80,
    z:(Math.random()-0.5)*80,
    w:3,
    h:Math.random()*10+5
  });
}

// ===== PROJECTION =====
function proj(px,pz){
  let dx=px-x;
  let dz=pz-z;

  let cos=Math.cos(angle);
  let sin=Math.sin(angle);

  let rx=dx*cos-dz*sin;
  let rz=dx*sin+dz*cos;

  let s=300/(rz+10);

  return {
    x:c.width/2 + rx*s,
    y:c.height/2,
    s:s,
    d:rz
  };
}

// ===== TELEPORT =====
function teleport(){
  if(!portalA || !portalB) return;

  let dA=Math.hypot(x-portalA.x, z-portalA.z);
  let dB=Math.hypot(x-portalB.x, z-portalB.z);

  if(dA < 1){
    x = portalB.x;
    z = portalB.z;
    speed = 0;
  }
  else if(dB < 1){
    x = portalA.x;
    z = portalA.z;
    speed = 0;
  }
}

// ===== LOOP =====
function loop(){
  requestAnimationFrame(loop);

  // movement (same feel as your car game)
  if(keys["w"]) speed += 0.02;
  if(keys["s"]) speed -= 0.02;
  speed *= 0.9;

  if(keys["a"]) angle += 0.04;
  if(keys["d"]) angle -= 0.04;

  x += Math.sin(angle) * speed * 2;
  z += Math.cos(angle) * speed * 2;

  teleport();

  // draw
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  let list=[];
  buildings.forEach(b=>{
    let p=proj(b.x,b.z);
    list.push({b,p});
  });

  list.sort((a,b)=>b.p.d-a.p.d);

  list.forEach(e=>{
    let w=e.b.w * e.p.s;
    let h=e.b.h * e.p.s;

    ctx.fillStyle="#888";
    ctx.fillRect(e.p.x - w/2, e.p.y - h, w, h);
  });

  function drawPortal(p,color){
    if(!p) return;
    let pr=proj(p.x,p.z);

    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 25*pr.s, 0, Math.PI*2);
    ctx.fill();
  }

  drawPortal(portalA,"blue");
  drawPortal(portalB,"orange");
}

loop();
</script>

</body>
</html>
