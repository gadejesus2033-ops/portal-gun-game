<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal FPS</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA (FIRST PERSON) =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== BUILDINGS (same style as your car game) =====
const buildings=[];
for(let i=0;i<80;i++){
  let h = Math.random()*10 + 5;

  let b = new THREE.Mesh(
    new THREE.BoxGeometry(4,h,4),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set(
    (Math.random()-0.5)*200,
    h/2,
    (Math.random()-0.5)*200
  );

  scene.add(b);
  buildings.push(b);
}

// ===== PLAYER =====
let x=0, y=2, z=0;
let yaw=0;

// ===== CONTROLS =====
let keys={};

addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// mouse look
document.body.onclick = ()=>document.body.requestPointerLock();

addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX * 0.002;
  }
});

// ===== PORTALS =====
let portalA=null;
let portalB=null;

function makePortal(color){
  let p = new THREE.Mesh(
    new THREE.TorusGeometry(1,0.3,16,100),
    new THREE.MeshBasicMaterial({color})
  );
  scene.add(p);
  return p;
}

addEventListener("mousedown", e=>{
  let dx = Math.sin(yaw);
  let dz = Math.cos(yaw);

  let px = x + dx*10;
  let pz = z + dz*10;

  if(e.button===0){
    if(!portalA) portalA = makePortal(0x0000ff);
    portalA.position.set(px,1,pz);
  }

  if(e.button===2){
    if(!portalB) portalB = makePortal(0xff8800);
    portalB.position.set(px,1,pz);
  }
});

addEventListener("contextmenu", e=>e.preventDefault());

// ===== TELEPORT =====
function teleport(){
  if(!portalA || !portalB) return;

  let dA = Math.hypot(x-portalA.position.x, z-portalA.position.z);
  let dB = Math.hypot(x-portalB.position.x, z-portalB.position.z);

  if(dA < 2){
    x = portalB.position.x;
    z = portalB.position.z;
  }
  else if(dB < 2){
    x = portalA.position.x;
    z = portalA.position.z;
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  let speed = 0.2;

  if(keys["w"]){
    x += Math.sin(yaw) * speed;
    z += Math.cos(yaw) * speed;
  }
  if(keys["s"]){
    x -= Math.sin(yaw) * speed;
    z -= Math.cos(yaw) * speed;
  }

  if(keys["a"]){
    x += Math.sin(yaw + Math.PI/2) * speed;
    z += Math.cos(yaw + Math.PI/2) * speed;
  }
  if(keys["d"]){
    x += Math.sin(yaw - Math.PI/2) * speed;
    z += Math.cos(yaw - Math.PI/2) * speed;
  }

  teleport();

  // FIRST PERSON CAMERA
  camera.position.set(x, y, z);
  camera.lookAt(
    x + Math.sin(yaw),
    y,
    z + Math.cos(yaw)
  );

  renderer.render(scene, camera);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
