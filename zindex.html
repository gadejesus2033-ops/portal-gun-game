<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal FPS FINAL</title>
<style>
  body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== FPS CAMERA =====
const pitchObject = new THREE.Object3D();
pitchObject.add(camera);

const yawObject = new THREE.Object3D();
yawObject.position.set(0, 2, 0);
yawObject.add(pitchObject);

scene.add(yawObject);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== BUILDINGS + COLLISION DATA =====
const buildings=[];

for(let i=0;i<80;i++){
  let h = Math.random()*10 + 5;

  let b = new THREE.Mesh(
    new THREE.BoxGeometry(4,h,4),
    new THREE.MeshLambertMaterial({color:0x888888})
  );

  b.position.set(
    (Math.random()-0.5)*200,
    h/2,
    (Math.random()-0.5)*200
  );

  scene.add(b);

  buildings.push({
    mesh:b,
    size:2 // half width
  });
}

// ===== CONTROLS =====
let keys={};

addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

document.body.onclick = ()=>document.body.requestPointerLock();

// ===== MOUSE LOOK =====
addEventListener("mousemove", e=>{
  if(document.pointerLockElement){
    yawObject.rotation.y -= e.movementX * 0.002;
    pitchObject.rotation.x -= e.movementY * 0.002;

    pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x));
  }
});

// ===== COLLISION FUNCTION =====
function canMove(newPos){
  for(let b of buildings){
    let dx = newPos.x - b.mesh.position.x;
    let dz = newPos.z - b.mesh.position.z;

    if(Math.abs(dx) < b.size + 1 && Math.abs(dz) < b.size + 1){
      return false;
    }
  }
  return true;
}

// ===== PORTALS =====
let portalA=null;
let portalB=null;
let clickCount=0;

function makePortal(color){
  let p = new THREE.Mesh(
    new THREE.TorusGeometry(1,0.3,16,100),
    new THREE.MeshBasicMaterial({color})
  );
  scene.add(p);
  return p;
}

addEventListener("mousedown", e=>{
  if(e.button!==0) return;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const pos = yawObject.position.clone();

  const px = pos.x + dir.x * 10;
  const py = pos.y + dir.y * 10;
  const pz = pos.z + dir.z * 10;

  clickCount++;

  if(clickCount % 2 === 1){
    if(!portalA) portalA = makePortal(0x0000ff);
    portalA.position.set(px,py,pz);
  } else {
    if(!portalB) portalB = makePortal(0xff8800);
    portalB.position.set(px,py,pz);
  }
});

// ===== GUN =====
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,0.3,1),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(gun);

// ===== TELEPORT =====
function teleport(){
  if(!portalA || !portalB) return;

  let pos = yawObject.position;

  let dA = Math.hypot(pos.x-portalA.position.x, pos.z-portalA.position.z);
  let dB = Math.hypot(pos.x-portalB.position.x, pos.z-portalB.position.z);

  if(dA < 2){
    yawObject.position.copy(portalB.position);
  }
  else if(dB < 2){
    yawObject.position.copy(portalA.position);
  }
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  const forward = new THREE.Vector3();
  yawObject.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

  let speed = 0.2;

  let newPos = yawObject.position.clone();

  if(keys["w"]) newPos.add(forward.clone().multiplyScalar(speed));
  if(keys["s"]) newPos.add(forward.clone().multiplyScalar(-speed));
  if(keys["a"]) newPos.add(right.clone().multiplyScalar(-speed));
  if(keys["d"]) newPos.add(right.clone().multiplyScalar(speed));

  // APPLY COLLISION
  if(canMove(newPos)){
    yawObject.position.copy(newPos);
  }

  teleport();

  // ===== GUN =====
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const rightVec = new THREE.Vector3();
  rightVec.crossVectors(dir, new THREE.Vector3(0,1,0)).normalize();

  gun.position.copy(camera.position);
  gun.position.add(dir.clone().multiplyScalar(0.8));
  gun.position.add(rightVec.clone().multiplyScalar(0.4));
  gun.position.y -= 0.5;

  gun.rotation.copy(camera.rotation);

  renderer.render(scene, camera);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
